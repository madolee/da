<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>chose  day of week </title>
  <style>
    .day-box {
      display: none; /* hide first */
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <h4>chose day of week </h2>

  <!-- day of week buton -->
  <fieldset>
    <legend>choce day of week </legend>
    <label><input type="radio" name="weekday" value="sun"> 일요일</label>
    <label><input type="radio" name="weekday" value="mon"> 월요일</label>
    <label><input type="radio" name="weekday" value="tue"> 화요일</label>
    <label><input type="radio" name="weekday" value="wed"> 수요일</label>
    <label><input type="radio" name="weekday" value="thu"> 목요일</label>
    <label><input type="radio" name="weekday" value="fri"> 금요일</label>
    <label><input type="radio" name="weekday" value="sat"> 토요일</label>
  </fieldset>

  <!-- 요일별 텍스트 영역 -->
  <div id="sun" class="day-box">일요일 텍스트 영역</div>
  <div id="mon" class="day-box">월요일 텍스트 영역</div>
  <div id="tue" class="day-box">화요일 텍스트 영역</div>
  <div id="wed" class="day-box">수요일 텍스트 영역</div>
  <div id="thu" class="day-box">목요일 텍스트 영역</div>
  <div id="fri" class="day-box">금요일 텍스트 영역</div>
  <div id="sat" class="day-box">토요일 텍스트 영역</div>

  <script>
    // 모든 라디오 버튼에 이벤트 추가
    document.querySelectorAll('input[name="weekday"]').forEach(radio => {
      radio.addEventListener("change", (e) => {
        const selected = e.target.value;

        // 모든 텍스트 영역 숨기기
        document.querySelectorAll(".day-box").forEach(box => {
          box.style.display = "none";
        });

        // 선택한 요일 영역만 표시
        const box = document.getElementById(selected);
        if (box) {
          box.style.display = "block";
        }
      });
    });
  </script>

  <fieldset>
    <legend>check List of 13 work time.</legend>
    <div><input type="checkbox" id="book"><label for="book">2book</label></div>
    <div><input type="checkbox" id="uld"><label for="uld">Uld_check ,3:30/bab</label></div>
    <div><input type="checkbox" id="task"><label for="task">not Time? 2task</label></div>
    <div><input type="checkbox" id="lang"><label for="lang">13page,c_language. python</label></div>
    위와 같은 상황이 완료 됐는가?
  </fieldset>

  <script>
    // 체크박스 ID 목록
    const ids = ["book", "uld", "task", "lang"];

    // 페이지 로드 시 저장된 상태 불러오기
    window.onload = () => {
      ids.forEach(id => {
        const saved = localStorage.getItem(id);
        if (saved === "true") {
          document.getElementById(id).checked = true;
        }
      });
    };

    // 체크박스 상태가 바뀔 때 저장하기
    ids.forEach(id => {
      document.getElementById(id).addEventListener("change", (e) => {
        localStorage.setItem(id, e.target.checked);
      });
    });
  </script>
</body>
</html>
