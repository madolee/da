<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>날짜 조건 텍스트 + BGM</title>
  <style>
    .text-box {
      display: none; /* 기본적으로 숨김 */
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <h2>오늘 날짜 조건에 따른 텍스트 영역 + BGM</h2>

  <!-- 6개의 텍스트 영역 + 각 영역에 오디오 -->
 <div id="box0" class="text-box">
    텍스트 영역 0
    <audio id="audio0" src="http://182.221.61.30/wL/mee.mp3" controls ></audio>
  </div>
  <div id="box1" class="text-box">
    텍스트 영역 1
    <audio id="audio1" src="http://182.221.61.30/ria.mp3" controls ></audio>
  </div>
  <div id="box2" class="text-box">
    텍스트 영역 2
    <audio id="audio2" src="http://182.221.61.30/mntt/mp3/deli.mp3" controls ></audio>

  </div>
  <div id="box3" class="text-box">
    텍스트 영역 3
    <audio id="audio3" src="http://182.221.61.30/mntt/mp3/gopati.mp3" controls ></audio>
  </div>
  <div id="box4" class="text-box">
    텍스트 영역 4
    <audio id="audio4" src="http://182.221.61.30/mntt/mp3-3/111.mp3" controls ></audio>
  </div>
  <div id="box5" class="text-box">
    텍스트 영역 5
    <audio id="audio5" src="http://182.221.61.30/mntt/mp3-3/1222.mp3" controls ></audio>
  </div>

  <script>
    // 오늘 날짜 가져오기
    const today = new Date();
    const day = today.getDate(); // 일(day)

    const remainder = day % 6;   // 6으로 나눈 나머지 (0~5)

    // 해당 번호의 텍스트 영역 표시
    const box = document.getElementById("box" + remainder);
    const audio = document.getElementById("audio" + remainder);

    if (box && audio) {
      box.style.display = "block";

      // 사용자 상호작용 후 자동재생 시도
      document.body.addEventListener("click", () => {
        audio.play().catch(err => {
          console.log("자동재생이 차단될 수 있습니다:", err);
        });
      }, { once: true });
    }
  </script>
</body>
</html>
