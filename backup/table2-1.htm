<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>un-page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      vertical-align: top;
      padding: 10px;
    }
    button {
      display: block;
      margin: 8px 0;
      width: 120px;
      padding: 8px;
      border: 1px solid #333;
      background-color: #f0f0f0;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button.active {
      background-color: #4CAF50; /*  */
      color: white;
      transform: scale(1.05);   /*  */
    }
    .text-block {
    /*  display: none;  first hide */
      white-space: pre-wrap;
      margin: 10px 0;
      border: 1px solid #ccc;
      padding: 10px;
      background-color: #fafafa; }
  </style>
</head>
<body>
<table border="1" style="width:100%; border-collapse:collapse;">
  <tr>
    <!-- 좌측 상단 텍스트 구역 -->
    <td style="width:50%; vertical-align:top;">
      <div class="text-block">
        첫 번째 텍스트 구역 내용<br>
        줄바꿈도 그대로 유지됩니다.
      </div>
    </td>
    <!-- 우측 합친 텍스트 구역 -->
    <td rowspan="2" style="width:50%; vertical-align:top;">
      <div class="text-block">
        첫 번째 텍스트 구역 내용<br>
        두 번째 텍스트 구역 내용<br>
        (좌측 두 구역을 합친 결과)
      </div>
    </td>
  </tr>
  <tr>
    <!-- 좌측 하단 텍스트 구역 -->
    <td style="width:50%; vertical-align:top;">
      <div class="text-block">
        두 번째 텍스트 구역 내용<br>
        여기도 pre 효과로 표시됩니다.
      </div>
    </td>
  </tr>
</table>


</body>
</html>
