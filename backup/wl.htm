    <h1>실시간 SerialPort 데이터</h1>
    <ul id="data-list"></ul>

    <script>
        const ws = new WebSocket('ws://182.221.61.30:3001'); // 웹소켓 연결
        const dataList = document.getElementById('data-list');

        ws.onmessage = (message) => {
            const listItem = document.createElement('li');
            listItem.textContent = message.data; // 수신된 데이터 추가
            dataList.appendChild(listItem);
        };
    </script>
